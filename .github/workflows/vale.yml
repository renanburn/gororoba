name: Vale
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instala Vale
        env:
          VALE_VERSION: "3.15.1"
        run: |
          set -euo pipefail
          url="https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
          curl -sfL "$url" -o vale.tar.gz
          mkdir -p bin
          tar -xzf vale.tar.gz -C bin vale
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Confere a instalação
        run: vale --version
      - name: Testa o ruleset
        run: bash tests/run.sh
