name: Vale
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instala Vale
        run: |
          curl -sfL https://install.goreleaser.com/github.com/ValeLint/vale.sh | sh -s v3.15.1
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: Testa o ruleset
        run: bash tests/run.sh
